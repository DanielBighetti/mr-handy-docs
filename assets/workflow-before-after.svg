<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="Workflow comparison: today versus with Mr. Handy. Today is a manual loop that requires full rewrite on every change. With Mr. Handy is a pipeline that lets you re-run for delta.">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .panel { fill: #14191f; stroke: rgba(255,255,255,0.08); stroke-width: 1; rx: 12; ry: 12; }
      .panel-today { fill: rgba(255,122,0,0.04); stroke: rgba(255,122,0,0.35); stroke-width: 1; }
      .panel-handy { fill: rgba(0,203,93,0.04); stroke: rgba(0,203,93,0.35); stroke-width: 1; }
      .label-caps { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.8px; text-transform: uppercase; fill: rgba(255,255,255,0.55); }
      .label-today { fill: #FF7A00; }
      .label-handy { fill: #00CB5D; }
      .node { fill: #1a1f28; stroke: rgba(255,255,255,0.18); stroke-width: 1; rx: 8; ry: 8; }
      .node-today { stroke: rgba(255,122,0,0.45); }
      .node-handy { stroke: rgba(0,203,93,0.45); }
      .node-text { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #f5f5f7; text-anchor: middle; }
      .node-sub { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: rgba(255,255,255,0.55); text-anchor: middle; }
      .arrow { fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-today { stroke: #FF7A00; }
      .arrow-handy { stroke: #00CB5D; }
      .arrow-soft { fill: none; stroke: rgba(255,255,255,0.18); stroke-width: 1.4; stroke-dasharray: 4 4; stroke-linecap: round; }
      .footnote { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; fill: rgba(255,255,255,0.45); text-anchor: middle; font-style: italic; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="720" height="420" />

  <!-- Top panel: TODAY -->
  <rect class="panel panel-today" x="24" y="24" width="672" height="170" rx="12" />
  <text x="44" y="52" class="label-caps label-today">Today · Manual handoff</text>

  <!-- Flow nodes for today -->
  <g>
    <rect class="node node-today" x="44" y="80" width="100" height="64" />
    <text x="94" y="108" class="node-text">Figma</text>
    <text x="94" y="126" class="node-sub">frames done</text>

    <rect class="node node-today" x="184" y="80" width="120" height="64" />
    <text x="244" y="108" class="node-text">Docs marathon</text>
    <text x="244" y="126" class="node-sub">read · reconcile</text>

    <rect class="node node-today" x="344" y="80" width="120" height="64" />
    <text x="404" y="108" class="node-text">SpecCards</text>
    <text x="404" y="126" class="node-sub">by hand</text>

    <rect class="node node-today" x="504" y="80" width="120" height="64" />
    <text x="564" y="108" class="node-text">PR rework</text>
    <text x="564" y="126" class="node-sub">dev questions</text>

    <!-- arrows -->
    <path class="arrow arrow-today" d="M 144 112 L 184 112" />
    <path class="arrow arrow-today" d="M 304 112 L 344 112" />
    <path class="arrow arrow-today" d="M 464 112 L 504 112" />

    <!-- feedback loop arrow: change in Figma → full rewrite -->
    <path class="arrow-today" d="M 564 144 C 564 165, 360 175, 244 165" fill="none" stroke-width="1.6" stroke-dasharray="5 4" />
    <path class="arrow-today" d="M 248 161 L 240 167 L 248 173" fill="none" stroke-width="1.6" />
  </g>

  <text x="360" y="184" class="footnote">Anything in Figma moves → rewrite the whole stack. ~35 hours of handoff work per cycle.</text>

  <!-- Bottom panel: WITH MR. HANDY -->
  <rect class="panel panel-handy" x="24" y="226" width="672" height="170" rx="12" />
  <text x="44" y="254" class="label-caps label-handy">With Mr. Handy · Same Figma file</text>

  <g>
    <rect class="node node-handy" x="44" y="282" width="100" height="64" />
    <text x="94" y="310" class="node-text">Figma</text>
    <text x="94" y="328" class="node-sub">frames done</text>

    <rect class="node node-handy" x="184" y="282" width="160" height="64" />
    <text x="264" y="310" class="node-text">/handoff-create</text>
    <text x="264" y="328" class="node-sub">walks file via MCP</text>

    <rect class="node node-handy" x="384" y="282" width="140" height="64" />
    <text x="454" y="310" class="node-text">Manifest</text>
    <text x="454" y="328" class="node-sub">SpecCards + Notes</text>

    <rect class="node node-handy" x="564" y="282" width="120" height="64" />
    <text x="624" y="310" class="node-text">Polish</text>
    <text x="624" y="328" class="node-sub">3–6 hours</text>

    <path class="arrow arrow-handy" d="M 144 314 L 184 314" />
    <path class="arrow arrow-handy" d="M 344 314 L 384 314" />
    <path class="arrow arrow-handy" d="M 524 314 L 564 314" />

    <!-- feedback loop: change in Figma → re-run for delta -->
    <path class="arrow-handy" d="M 624 346 C 624 380, 264 380, 264 346" fill="none" stroke-width="1.6" stroke-dasharray="5 4" />
    <path class="arrow-handy" d="M 268 350 L 260 346 L 268 342" fill="none" stroke-width="1.6" />
  </g>

  <text x="360" y="404" class="footnote">Something changed? Re-run the pipeline. You patch the delta, not rewrite the manifest.</text>
</svg>
