<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Step 1 — Download the Mr. Handy zip">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e0e1a"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="dlBtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2997FF"/>
      <stop offset="1" stop-color="#1e6fd9"/>
    </linearGradient>
    <filter id="soft1" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dy="3" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="760" fill="url(#bg1)"/>

  <!-- Browser chrome -->
  <g filter="url(#soft1)">
    <rect x="80" y="60" width="1040" height="640" rx="14" fill="#1f1f30" stroke="#3a3a55" stroke-width="1.5"/>
    <rect x="80" y="60" width="1040" height="44" rx="14" fill="#2a2a3e"/>
    <rect x="80" y="88" width="1040" height="16" fill="#2a2a3e"/>
    <circle cx="110" cy="82" r="6" fill="#ff5f57"/>
    <circle cx="132" cy="82" r="6" fill="#febc2e"/>
    <circle cx="154" cy="82" r="6" fill="#28c840"/>
    <rect x="200" y="68" width="600" height="28" rx="14" fill="#16161f"/>
    <text x="220" y="86" font-family="-apple-system,Segoe UI,sans-serif" font-size="13" fill="#8888a8">https://github.com/your-org/mr-handy/releases/latest</text>
  </g>

  <!-- Page content -->
  <g font-family="-apple-system,Segoe UI,sans-serif" fill="#e8e8f4">
    <text x="120" y="160" font-size="14" font-weight="600" fill="#86868B">RELEASE</text>
    <text x="120" y="200" font-size="34" font-weight="700">Mr. Handy v1.9.4</text>
    <text x="120" y="240" font-size="14" fill="#9a9ab5">Published 2026-07-04 · 119.73 MB · 481 files</text>

    <text x="120" y="300" font-size="15" fill="#c5c5d8">Assets</text>
    <rect x="120" y="320" width="960" height="80" rx="10" fill="#262640" stroke="#3a3a55"/>
    <text x="150" y="358" font-size="15" font-weight="600">MrHandy-v1.9.4.zip</text>
    <text x="150" y="380" font-size="13" fill="#86868B">Source code (zip) · 119.73 MB · Updated 2026-07-04</text>

    <!-- Download button -->
    <g filter="url(#soft1)">
      <rect x="940" y="345" width="120" height="32" rx="6" fill="url(#dlBtn)"/>
      <text x="985" y="366" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">Download</text>
    </g>
  </g>

  <!-- Step badge -->
  <g transform="translate(80, 60)">
    <circle r="22" cx="0" cy="0" fill="#2997FF"/>
    <text x="0" y="6" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  </g>

  <!-- Caption -->
  <text x="600" y="730" font-family="-apple-system,Segoe UI,sans-serif" font-size="13" fill="#9a9ab5" text-anchor="middle">
    Download MrHandy-v1.9.4.zip from your release page (or git clone).
  </text>
</svg>
