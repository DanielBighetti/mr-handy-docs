<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mr. Handy Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="theme-dark.css">
</head>
<body>
  <div id="app">Carregando documentação do Mr. Handy...</div>

  <script>
    window.$docsify = {
      name: 'Mr. Handy Docs',
      repo: '',
      homepage: 'README.md',
      loadSidebar: true,
      subMaxLevel: 3,
      search: {
        placeholder: 'Buscar na documentação',
        noData: 'Nenhum resultado encontrado',
        depth: 3
      }
    }
  </script>

  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
<script>
document.addEventListener('click', function (event) {
  var link = event.target.closest('[data-scroll-target]');
  if (!link) return;

  event.preventDefault();
  event.stopPropagation();

  var targetId = link.getAttribute('data-scroll-target');
  var target = document.getElementById(targetId);

  if (!target) {
    target = document.querySelector('[name="' + targetId + '"]');
  }

  if (target) {
    target.scrollIntoView({
      behavior: 'smooth',
      block: 'start'
    });
  }
}, true);
</script>
</body>
</html>
