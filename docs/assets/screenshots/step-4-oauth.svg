<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Step 4 — Figma OAuth consent page in the browser">
  <defs>
    <linearGradient id="bg4o" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="figmaBrand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F24E1E"/>
      <stop offset=".33" stop-color="#A259FF"/>
      <stop offset=".66" stop-color="#1ABCFE"/>
      <stop offset="1" stop-color="#0ACF83"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg4o)"/>

  <!-- Chrome frame -->
  <rect x="40" y="40" width="1120" height="680" rx="14" fill="#1f242c" stroke="#30363d" stroke-width="2"/>
  <rect x="40" y="40" width="1120" height="44" rx="14" fill="#0d1117"/>
  <rect x="40" y="68" width="1120" height="16" fill="#0d1117"/>
  <circle cx="68" cy="62" r="6" fill="#ff5f57"/>
  <circle cx="92" cy="62" r="6" fill="#febc2e"/>
  <circle cx="116" cy="62" r="6" fill="#28c840"/>
  <rect x="160" y="50" width="880" height="24" rx="6" fill="#161b22"/>
  <text x="180" y="67" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#8b949e">
    <tspan>https://figma-console-mcp.southleft.com/oauth/authorize?client_id=mr-handy&amp;…</tspan>
  </text>

  <!-- OAuth card -->
  <rect x="280" y="140" width="640" height="520" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="2"/>

  <!-- Figma logo bar -->
  <rect x="280" y="140" width="640" height="100" rx="12" fill="url(#figmaBrand)" opacity=".15"/>
  <g transform="translate(560,170)">
    <circle cx="0" cy="20" r="20" fill="#F24E1E" opacity=".9"/>
    <circle cx="20" cy="20" r="20" fill="#A259FF" opacity=".9"/>
    <circle cx="40" cy="20" r="20" fill="#1ABCFE" opacity=".9"/>
    <circle cx="0" cy="40" r="20" fill="#0ACF83" opacity=".9"/>
  </g>
  <text x="600" y="240" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" fill="#e6edf3" text-anchor="middle">Figma Console MCP</text>

  <!-- Body -->
  <text x="600" y="310" font-family="-apple-system, system-ui, sans-serif" font-size="16" fill="#8b949e" text-anchor="middle">wants to access your Figma account</text>

  <!-- Permission list -->
  <g transform="translate(320,350)">
    <text font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#8b949e" y="0">This will allow Mr. Handy to:</text>
    <g transform="translate(0,30)">
      <text x="14" y="14" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#3fb950">✓</text>
      <text x="40" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#e6edf3">Read files, components, and styles from Figma</text>
    </g>
    <g transform="translate(0,60)">
      <text x="14" y="14" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#3fb950">✓</text>
      <text x="40" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#e6edf3">Create and edit frames, components, and variables</text>
    </g>
    <g transform="translate(0,90)">
      <text x="14" y="14" font-family="ui-monospace, Menlo, monospace" font-size="14" fill="#3fb950">✓</text>
      <text x="40" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#e6edf3">Run console / plugin / variable queries via MCP</text>
    </g>
  </g>

  <!-- Buttons -->
  <rect x="320" y="560" width="260" height="56" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="594" font-family="-apple-system, system-ui, sans-serif" font-size="15" fill="#8b949e" text-anchor="middle">Cancel</text>

  <rect x="620" y="560" width="260" height="56" rx="8" fill="#1f883d"/>
  <text x="750" y="594" font-family="-apple-system, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Allow</text>

  <!-- Cursor highlight on the Allow button -->
  <text x="870" y="600" font-family="ui-monospace, Menlo, monospace" font-size="24" fill="#e6edf3">◀ click</text>

  <!-- Footer note -->
  <text x="600" y="720" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6e7681" text-anchor="middle">You only see this once. After you click Allow, Mr. Handy uses the cached token until you revoke it.</text>
</svg>
